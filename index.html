<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cileo</title>
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f8fafc; /* Color de fondo suave (slate-50) */
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }

      .logo-container {
        text-align: center;
        padding: 2rem;
        animation: fadeIn 1s ease-in-out;
      }

      .logo {
        max-width: 300px;
        width: 100%;
        height: auto;
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
        transition: transform 0.3s ease;
      }

      .logo:hover {
        transform: scale(1.05);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="logo-container">
      <img src="logo.png" alt="Cileo Logo" class="logo" />
    </div>
  </body>
</html>
