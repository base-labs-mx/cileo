<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cileo - Próximamente</title>
    <meta
      name="description"
      content="Cileo: Plataforma avanzada para la gestión de contratos, facturación y propiedades."
    />

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --accent-color: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.5);
        --bg-color: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body,
      html {
        height: 100%;
        margin: 0;
        font-family:
          "Outfit",
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        overflow-x: hidden;
      }

      /* Background gradient shapes */
      .bg-shapes {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }

      .shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.15;
        animation: floatAura 12s infinite alternate ease-in-out;
      }

      .shape-1 {
        top: -15%;
        left: -10%;
        width: 600px;
        height: 600px;
        background: #3b82f6; /* Blue */
      }

      .shape-2 {
        bottom: -20%;
        right: -10%;
        width: 700px;
        height: 700px;
        background: #10b981; /* Emerald/Green */
        animation-delay: -6s;
      }

      .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      /* Logo animation */
      .logo-wrapper {
        margin-bottom: 2.5rem;
        animation: slideDownFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }

      .logo {
        max-width: 260px;
        width: 100%;
        height: auto;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .logo:hover {
        transform: scale(1.04) translateY(-4px);
      }

      /* Content Area */
      .content {
        max-width: 640px;
        animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        opacity: 0;
        transform: translateY(20px);
      }

      /* Status Badge */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1.25rem;
        background: rgba(59, 130, 246, 0.08);
        border: 1px solid rgba(59, 130, 246, 0.2);
        color: var(--accent-color);
        border-radius: 9999px;
        font-weight: 600;
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .pulse-dot {
        width: 8px;
        height: 8px;
        background-color: var(--accent-color);
        border-radius: 50%;
        box-shadow: 0 0 0 0 var(--accent-glow);
        animation: pulse 2s infinite;
      }

      h1 {
        font-size: clamp(2.5rem, 6vw, 4rem);
        font-weight: 700;
        margin: 0 0 1.25rem 0;
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      p {
        font-size: clamp(1.125rem, 2.5vw, 1.25rem);
        color: var(--text-secondary);
        line-height: 1.6;
        margin: 0 0 2rem 0;
        font-weight: 300;
      }

      /* Divider line */
      .divider {
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, #3b82f6, #10b981);
        border-radius: 2px;
        margin: 0 auto 2rem auto;
      }

      .footer {
        margin-top: 3rem;
        color: #94a3b8;
        font-size: 0.875rem;
        animation: fade 1s ease 0.6s forwards;
        opacity: 0;
      }

      /* Keyframes */
      @keyframes slideDownFade {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideUpFade {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes autoFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes fade {
        to {
          opacity: 1;
        }
      }

      @keyframes floatAura {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(20px, -30px) scale(1.1);
        }
      }

      @keyframes pulse {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 var(--accent-glow);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
        }
      }

      @media (max-width: 640px) {
        .shape-1 {
          width: 400px;
          height: 400px;
        }
        .shape-2 {
          width: 400px;
          height: 400px;
        }
        .logo {
          max-width: 200px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background elements -->
    <div class="bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
    </div>

    <div class="container">
      <div class="logo-wrapper">
        <img src="logo.png" alt="Cileo Logo" class="logo" />
      </div>

      <div class="content">
        <div class="status-badge">
          <div class="pulse-dot"></div>
          Sitio en Construcción
        </div>

        <h1>Algo increíble está en camino</h1>

        <div class="divider"></div>

        <p>
          Estamos trabajando arduamente en el desarrollo de la plataforma más
          completa y moderna para la gestión inteligente de contratos,
          facturación y propiedades.
        </p>

        <div class="footer">
          &copy;
          <script>
            document.write(new Date().getFullYear());
          </script>
          Cileo. Todos los derechos reservados.
        </div>
      </div>
    </div>
  </body>
</html>
