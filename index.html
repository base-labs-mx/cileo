<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cileo - Próximamente</title>
    <meta
      name="description"
      content="Cileo: Plataforma avanzada para la gestión de contratos, facturación y propiedades."
    />

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        /* Elipse Light Theme Colors */
        --background: #f7fefc;
        --foreground: #080b09; /* 158 29% 5% */
        --muted: #f1f5f9;
        --muted-foreground: #080b09;
        --border: #d1d1ce;

        /* Elipse Accents */
        --primary-bg-color: #edff8c;
        --secondary-bg-color: #fbffe4;
        --label-color: #1c1b1f;
        --text-color: #000000;
        --primary-text-color: #0a120f;
        --active-color: #3688cc;
        --success-color: #b7e25a;
        --pending-collection: #00add8;

        /* Local UI Colors */
        --accent-glow: rgba(54, 136, 204, 0.4);
        --btn-email-bg: #121212;
        --btn-email-text: #ffffff;
        --card-bg: rgba(255, 255, 255, 0.9);
      }

      * {
        box-sizing: border-box;
      }

      body,
      html {
        height: 100%;
        margin: 0;
        font-family:
          "Outfit",
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--background);
        color: var(--foreground);
        overflow-x: hidden;
      }

      /* Background gradient shapes */
      .bg-shapes {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }

      .shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.15;
        animation: floatAura 12s infinite alternate ease-in-out;
      }

      .shape-1 {
        top: -15%;
        left: -10%;
        width: 600px;
        height: 600px;
        background: var(--pending-collection); /* Blue/Cyan */
      }

      .shape-2 {
        bottom: -20%;
        right: -10%;
        width: 700px;
        height: 700px;
        background: var(--success-color); /* Elipse Green */
        animation-delay: -6s;
      }

      .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      /* Logo animation */
      .logo-wrapper {
        margin-bottom: 2.5rem;
        animation: slideDownFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }

      .logo {
        max-width: 260px;
        width: 100%;
        height: auto;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .logo:hover {
        transform: scale(1.04) translateY(-4px);
      }

      /* Content Area */
      .content {
        max-width: 640px;
        animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        opacity: 0;
        transform: translateY(20px);
      }

      /* Status Badge */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1.25rem;
        background: var(--muted);
        border: 1px solid var(--border);
        color: var(--primary-text-color);
        border-radius: 9999px;
        font-weight: 600;
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .pulse-dot {
        width: 8px;
        height: 8px;
        background-color: var(--active-color);
        border-radius: 50%;
        box-shadow: 0 0 0 0 var(--accent-glow);
        animation: pulse 2s infinite;
      }

      h1 {
        font-size: clamp(2.5rem, 6vw, 4rem);
        font-weight: 700;
        margin: 0 0 1.25rem 0;
        line-height: 1.1;
        letter-spacing: -0.02em;
        color: var(--primary-text-color);
      }

      p {
        font-size: clamp(1.125rem, 2.5vw, 1.25rem);
        color: var(--muted-foreground);
        line-height: 1.6;
        margin: 0 0 2rem 0;
        font-weight: 300;
      }

      /* Divider line */
      .divider {
        width: 60px;
        height: 4px;
        background: linear-gradient(
          90deg,
          var(--pending-collection),
          var(--success-color)
        );
        border-radius: 2px;
        margin: 0 auto 2rem auto;
      }

      .cta-container {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 1rem;
        align-items: center;
        width: 100%;
        max-width: 360px;
        margin-left: auto;
        margin-right: auto;
        animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        opacity: 0;
        transform: translateY(20px);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 0.875rem 2rem;
        border-radius: 12px;
        font-size: 1.125rem;
        font-weight: 500;
        text-decoration: none;
        transition:
          transform 0.2s ease,
          background-color 0.2s ease,
          opacity 0.2s ease;
        gap: 0.5rem;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn:active {
        transform: translateY(0);
        opacity: 0.9;
      }

      .btn-whatsapp {
        background-color: var(--primary-bg-color);
        color: #000000;
        font-weight: 600;
      }

      .btn-email {
        background-color: var(--btn-email-bg);
        color: var(--btn-email-text);
        border: none;
        font-weight: 600;
      }

      .footer {
        margin-top: 3rem;
        color: var(--muted-foreground);
        font-size: 0.875rem;
        animation: fade 1s ease 0.6s forwards;
        opacity: 0;
      }

      /* Keyframes */
      @keyframes slideDownFade {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideUpFade {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade {
        to {
          opacity: 1;
        }
      }

      @keyframes floatAura {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(20px, -30px) scale(1.1);
        }
      }

      @keyframes pulse {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 var(--accent-glow);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 10px rgba(54, 136, 204, 0);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(54, 136, 204, 0);
        }
      }

      @media (max-width: 640px) {
        .shape-1,
        .shape-2 {
          width: 400px;
          height: 400px;
        }
        .logo {
          max-width: 200px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background elements -->
    <div class="bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
    </div>

    <div class="container">
      <div class="logo-wrapper">
        <img src="logo.png" alt="Cileo Logo" class="logo" />
      </div>

      <div class="content">
        <div class="status-badge">
          <div class="pulse-dot"></div>
          Sitio en Construcción
        </div>

        <h1>Algo increíble está en camino</h1>

        <div class="divider"></div>

        <p>
          Estamos trabajando arduamente en el desarrollo de la plataforma más
          completa y moderna para la gestión inteligente de contratos,
          facturación y propiedades.
        </p>

        <div class="cta-container">
          <!-- WhatsApp Button -->
          <a
            href="https://wa.me/+525662976298"
            target="_blank"
            rel="noopener noreferrer"
            class="btn btn-whatsapp"
          >
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"
              />
            </svg>
            Escribir por WhatsApp
          </a>

          <!-- Email Button -->
          <a href="mailto:jose@cileo.io" class="btn btn-email">
            Escribir a jose@cileo.io
          </a>
        </div>

        <div class="footer">
          &copy;
          <script>
            document.write(new Date().getFullYear());
          </script>
          Cileo. Todos los derechos reservados.
        </div>
      </div>
    </div>
  </body>
</html>
